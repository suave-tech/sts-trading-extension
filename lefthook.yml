pre-commit:
  parallel: true
  commands:
    lint:
      glob: "src/**/*.{ts,tsx}"
      run: pnpm biome lint --apply {staged_files}
    format:
      glob: "src/**/*.{ts,tsx,json}"
      run: pnpm biome format --write {staged_files}
    type-check:
      run: npx tsc --noEmit

pre-push:
  parallel: false
  commands:
    tests:
      run: pnpm test
    build-check:
      run: pnpm build
